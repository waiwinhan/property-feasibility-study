version: '3.9'

# Staging — production builds, remote Supabase, HTTP only (SSL terminated at VPS reverse proxy)
# Usage: docker compose -f docker-compose.staging.yml up -d --build

services:
  client:
    build:
      context: .
      dockerfile: client.Dockerfile
      target: production
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server.Dockerfile
      target: production
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_URL=${CLIENT_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
