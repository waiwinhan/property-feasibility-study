name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-server:
    name: Server — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Run unit tests
        run: npm test
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: test-key

  lint-client:
    name: Client — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint

  build-client:
    name: Client — Build
    runs-on: ubuntu-latest
    needs: lint-client
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:3001/api

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [test-server, build-client]
    # Only run Docker build on push to main/develop (skip for PRs to save minutes)
    steps:
      - uses: actions/checkout@v4
      - name: Build client image
        run: docker build -f client.Dockerfile --target production -t wai-client:ci .
      - name: Build server image
        run: docker build -f server.Dockerfile --target production -t wai-server:ci .
