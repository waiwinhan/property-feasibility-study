version: '3.9'

services:
  client:
    build:
      context: .
      dockerfile: client.Dockerfile
      target: production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl:ro
    restart: always
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server.Dockerfile
      target: production
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_URL=${CLIENT_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g

volumes: {}
